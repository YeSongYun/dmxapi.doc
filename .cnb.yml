main:
  push:
    - name: "同步到 GitHub"
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 2
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/YeSongYun/dmxapi.doc.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            force: true

  pull_request:
    - name: "AI 代码评审"
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      stages:
        - name: code-review
          image: cnbcool/code-review:latest
          settings:
            context: 50
            verbose: true
            comment: true
            max_comments: 50
            max_files: 150
            max_diff_size: 200000
            fail_on_critical: true

$:
  tag_push:
    - name: "构建并部署文档"
      imports: https://cnb.cool/dmxapi/claude-code-my/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      stages:
        - name: build
          image: node:20-alpine
          script: |
            apk add --no-cache git
            npm install
            npm run docs:build
        - name: deploy
          image: node:20-alpine
          script: |
            apk add --no-cache openssh-client
            mkdir -p ~/.ssh
            echo "${SSH_PRIVATE_KEY}" | base64 -d > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            SSH_OPTS="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            scp -r $SSH_OPTS .vitepress/dist/* root@114.66.11.141:/www/wwwroot/cn.doc/
