            - generic [ref=e354]: api_key = "sk-******************************************"
            - generic [ref=e355]: "# ═══════════════════════════════════════════════════════════════"
            - generic [ref=e356]: "# 步骤2: 配置请求头"
            - generic [ref=e357]: "# ═══════════════════════════════════════════════════════════════"
            - generic [ref=e358]: "headers = {"
            - generic [ref=e359]: "\"Content-Type\": \"application/json\", # 指定请求体为 JSON 格式"
