            - generic [ref=e363]: "# 步骤3: 配置请求参数"
            - generic [ref=e364]: "# ═══════════════════════════════════════════════════════════════"
            - generic [ref=e365]: "payload = {"
            - generic [ref=e366]: "# 【model】(string, 必需) 模型名称"
            - generic [ref=e367]: "# 本文档对应模型: \"PixVerse-C1\""
            - generic [ref=e368]: "\"model\": \"PixVerse-C1\","
            - generic [ref=e369]: "# 【input】(string, 必需) 文本提示词（对应官方文档中的 prompt 字段）"
            - generic [ref=e370]: "# 描述希望生成视频的内容画面"
            - generic [ref=e371]: "# 长度限制: 2048 Characters 以内"
            - generic [ref=e372]: "\"input\": \"可爱的小猫在海边愉快的玩耍\","
            - generic [ref=e373]: "# 【img_id】(integer, 必需) 上传图片后获取的图片 ID"
            - generic [ref=e374]: "# 通过前置依赖\"拍我图片上传 API\"调用后返回的 img_id"
            - generic [ref=e375]: "\"img_id\": 177602101,"
            - generic [ref=e376]: "# 【style】(string, 可选) 视频风格预设，如非必要可不传"
            - generic [ref=e377]: "# 可选值: \"anime\"(动漫) / \"3d_animation\"(3D 动画) / \"day\"(日常) /"
            - generic [ref=e378]: "# \"cyberpunk\"(赛博朋克) / \"comic\"(漫画)"
            - generic [ref=e379]: "\"style\": \"3d_animation\","
            - generic [ref=e380]: "# 【duration】(integer, 必需) 视频生成时长（单位: 秒）"
            - generic [ref=e381]: "# 取值范围: 1~15 秒"
            - generic [ref=e382]: "\"duration\": 5,"
            - generic [ref=e383]: "# 【quality】(string, 必需) 视频画质"
            - generic [ref=e384]: "# 可选值: \"360p\" / \"540p\" / \"720p\" / \"1080p\""
            - generic [ref=e385]: "\"quality\": \"540p\","
            - generic [ref=e386]: "# 【generate_audio_switch】(boolean, 可选) 控制音频开关"
            - generic [ref=e387]: "# true: Audio on (开启音频生成)"
            - generic [ref=e388]: "# false: Audio off (关闭音频生成)"
            - generic [ref=e389]: "\"generate_audio_switch\": True,"
            - generic [ref=e390]: "# 【seed】(integer, 可选) 随机数种子"
