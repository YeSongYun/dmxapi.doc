        - paragraph [ref=e305]: PixVerse-C1 是拍我AI（PaiVideo）推出的新一代图生视频模型。基于上传的参考图像和文字提示，可生成 1~15 秒任意时长的高质量视频，支持最高 1080p 画质输出，内置 5 种艺术风格预设（动漫、3D 动画、日常、赛博朋克、漫画），并可选择开启同步音频生成。适用于社交媒体内容创作、广告营销、产品演示等多种图像驱动型视频生成场景。
